name: 部署到 static 分支

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予 GITHUB_TOKEN 代码推送权限，解决 403 核心问题

    steps:
      - name: 检出源码
        uses: actions/checkout@main
        with:
          ref: main
          
      - name: 缓存项目 npm 包
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          # 修复：移除不存在的 matrix.node-version 变量，避免缓存失效
          key: ${{ runner.os }}-node-20-nodeModules-${{ hashFiles('package-lock.json') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-nodeModules-

      - name: 设置 Node.js 环境
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: 安装依赖
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm i --save

      - name: 构建站点
        run: npm run build

      - name: 部署到 static 分支
        run: |
          cd ./dist
          git init
          git config user.name 'GitHub Action'
          git config user.email 'action@github.com'
          git add .
          git commit -m "🤓$(date +"%Z %Y-%m-%d %A %H:%M:%S")"
          # 核心修改：推送至当前仓库的 static 分支，不再指向原作者仓库
          git push --force --quiet "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" master:refs/heads/static